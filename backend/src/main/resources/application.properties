spring.application.name=loja-virtual

# H2 Database
spring.datasource.url=jdbc:h2:mem:lojadb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Server
server.port=8080

# n8n Webhook URL (configurar com a URL do seu webhook no n8n Cloud)
n8n.webhook.url=https://<SEU-ID>.app.n8n.cloud/webhook/pedido-analise
